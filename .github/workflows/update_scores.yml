name: MM-tulospäivitys

on:
  schedule:
    - cron: "0 * * * *" # Kerran tunnissa
  workflow_dispatch: # Mahdollistaa manuaalisen ajon

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests pymongo playwright python-dotenv
          playwright install chromium --with-deps

      - name: Run Scraper and Update DB
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scraping/movingdata.py
