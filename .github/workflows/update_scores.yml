name: Update World Cup Scores

on:
  schedule:
    # GitHub käyttää UTC-aikaa. Suomi on UTC+3 (kesäisin).
    # Tämä skripti ajetaan joka päivä kerran tunnissa klo 9:22 - 22:22 UTC-aikaa, mikä vastaa klo 12:22 - 01:22 Suomen aikaa.
    - cron: "22 9-22 * * *" # Aja joka päivä kerran tunnissaklo 9:22 - 22:22 UTC-aikaa (12:22-01:22 Suomen aikaa)
  workflow_dispatch: # Mahdollistaa ajon käsin GitHubin UI:sta

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install playwright pymongo dotenv pytz
          playwright install chromium

      - name: Run update script
        env:
          # Lisää nämä GitHub Secretsiin!
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python scraping/movingdata.py
